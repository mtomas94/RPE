<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPE Performance Tracker</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --bg: #0b0f1a; --card: #161b2c; --accent: #38bdf8;
            --text-main: #ffffff; --text-dim: #94a3b8;
            --danger: #ff4d4d; --success: #00e676; --wa: #25d366;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); margin: 0; padding: 10px; min-height: 100vh; }

        .nav { display: flex; background: var(--card); padding: 5px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #2d334a; }
        .nav button { flex: 1; padding: 12px; border-radius: 10px; border: none; background: transparent; color: var(--text-dim); font-weight: bold; cursor: pointer; }
        .nav button.active { background: var(--accent); color: #000; }

        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #2d334a; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin: 0 auto 15px auto; max-width: 500px; }
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .names-grid { display: grid; grid-template-columns: 1fr; gap: 8px; max-height: 60vh; overflow-y: auto; }
        .player-btn { background: #1e2538; border: 1px solid #2d334a; color: white; padding: 16px; border-radius: 12px; text-align: left; font-size: 14px; font-weight: 600; cursor: pointer; }

        .rpe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .rpe-btn { height: 60px; border: none; border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; }

        .c0 { background: #2e7d32; color: white; } .c1 { background: #43a047; color: white; }
        .c2 { background: #66bb6a; color: white; } .c3 { background: #9ccc65; color: black; }
        .c4 { background: #d4e157; color: black; } .c5 { background: #ffee58; color: black; }
        .c6 { background: #ffca28; color: black; } .c7 { background: #ffa726; color: white; }
        .c8 { background: #ef5350; color: white; } .c9 { background: #d32f2f; color: white; }
        .c10 { background: #b71c1c; color: white; }

        .item-row { display: flex; justify-content: space-between; align-items: center; background: #1e2538; padding: 10px; border-radius: 12px; margin-bottom: 6px; border: 1px solid #2d334a; }
        .rpe-badge { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: bold; }
        
        .btn-wa { background: var(--wa); color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; text-decoration: none; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; margin-left: 5px; }
        
        .section-title { font-size: 12px; font-weight: bold; margin: 15px 0 8px 0; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], input[type="date"] { width: 100%; padding: 12px; background: #0b0f1a; border: 1px solid #2d334a; color: white; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="nav">
        <button id="tab-p" class="active" onclick="switchTab('player')">PLAYER</button>
        <button id="tab-a" onclick="authAdmin()">COACH 🔒</button>
    </div>

    <div id="view-player" class="view active">
        <div id="step-login" class="card">
            <h2 style="margin:0 0 5px 0">Daily RPE Test</h2>
            <div class="names-grid" id="names-container"></div>
        </div>

        <div id="step-survey" class="card" style="display:none;">
            <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
                <h2 id="locked-name" style="margin:0; color: var(--accent); font-size: 16px;"></h2>
                <button onclick="unlockProfile()" style="background:#2d334a; border:none; color:var(--text-dim); padding:6px 10px; border-radius:8px; font-size:10px;">CHANGE NAME</button>
            </div>
            <div id="rpe-input-zone">
                <p style="margin:0 0 15px 0; font-size: 14px;">How was your effort today?</p>
                <div class="rpe-grid">
                    <script>for(let i=0; i<=10; i++) document.write(`<button class="rpe-btn c${i}" onclick="sendRPE(${i})">${i}</button>`);</script>
                </div>
            </div>
            <div id="rpe-done-zone" style="display:none; text-align:center; padding:10px 0;">
                <div style="font-size: 40px;">✅</div>
                <h3>Submitted!</h3>
                <button style="background:var(--danger); color:white; border:none; padding:12px; border-radius:10px; width:100%; font-weight:bold; margin-top:10px;" onclick="deleteResult()">REDO TEST</button>
            </div>
        </div>
    </div>

    <div id="view-admin" class="view">
        <div class="card">
            <h2 style="margin-top:0">RPE Results</h2>
            <input type="date" id="adm-date" onchange="renderAdmin()">
            
            <div class="section-title">Pending (WhatsApp reminder)</div>
            <div id="list-pending"></div>

            <div class="section-title">Completed</div>
            <div id="list-completed"></div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
                <button onclick="exportExcel()" style="background:#10b981; border:none; color:white; padding:12px; border-radius:10px; font-weight:bold;">EXCEL</button>
                <button onclick="exportPDF()" style="background:#6366f1; border:none; color:white; padding:12px; border-radius:10px; font-weight:bold;">PDF</button>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0">Manage Roster</h3>
            <div style="display:flex; gap:5px;">
                <input type="text" id="new-name" placeholder="Full name..." style="margin:0">
                <button onclick="addNewPlayer()" style="background:var(--accent); border:none; width:50px; border-radius:10px; font-size:20px;">+</button>
            </div>
            <div class="section-title">Current Squad</div>
            <div id="roster-list"></div>
        </div>
    </div>

<script>
   const firebaseConfig = {
  apiKey: "AIzaSyDQLERtbztN8ORRfQ8DrMJZSB4ChLhYIH4",
  authDomain: "rpe-scale.firebaseapp.com",
  databaseURL: "https://rpe-scale-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "rpe-scale",
  storageBucket: "rpe-scale.firebasestorage.app",
  messagingSenderId: "726397417954",
  appId: "1:726397417954:web:cf71b2a6e9b32cd53021bb",
  measurementId: "G-M9JEJCHVGT"
};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const INITIAL_ROSTER = ["01 BERGERUD Torbjorn", "03 DASZEK Michal", "06 SZOSTAK Krystian", "08 JANC Mitja", "09 SZYSZKO Jakub", "11 SROCZYK Marcel", "16 BORUCKI Wojciech", "17 SERDIO Abel", "19 SUSNJA Leon", "21 SAMOILA Kiryl", "22 RICHARDSON Melvyn", "23 ZARABEC Miha", "24 FAZEKAS Gergo", "26 KRAJEWSKI Przemyslaw", "30 TERZIC Mirsad", "32 ALILOVIC Mirko", "33 DAWYDZIK Dawid", "34 MIHIC Lovro", "43 ILIC Zoran", "49 SZITA Zoltan", "99 KOSOROTOV Sergei"];

    let players = [];
    let rpeResults = {};
    let activeUser = localStorage.getItem('active_rpe_user');
    let today = new Date().toISOString().split('T')[0];
    document.getElementById('adm-date').value = today;

    db.ref('/').on('value', (snap) => {
        const data = snap.val() || {};
        if(!data.rpe_players) { db.ref('rpe_players').set(INITIAL_ROSTER); }
        players = data.rpe_players ? Object.values(data.rpe_players) : [];
        rpeResults = data.rpe_results || {};
        refreshUI();
    });

    function refreshUI() {
        const currentData = rpeResults[today] || {};
        const container = document.getElementById('names-container');
        const pendingOnes = players.filter(p => !currentData[p.replace(/\W/g, '')]);
        container.innerHTML = pendingOnes.length > 0 
            ? pendingOnes.map(p => `<button class="player-btn" onclick="selectPlayer('${p}')">${p}</button>`).join('')
            : '<p style="text-align:center; color:var(--success); font-weight:bold;">DONE ✅</p>';

        if(activeUser) {
            document.getElementById('step-login').style.display = 'none';
            document.getElementById('step-survey').style.display = 'block';
            document.getElementById('locked-name').innerText = activeUser;
            checkStatus();
        } else {
            document.getElementById('step-login').style.display = 'block';
            document.getElementById('step-survey').style.display = 'none';
        }
        if(document.getElementById('view-admin').classList.contains('active')) renderAdmin();
    }

    function selectPlayer(name) { activeUser = name; localStorage.setItem('active_rpe_user', name); refreshUI(); }
    function unlockProfile() { localStorage.removeItem('active_rpe_user'); activeUser = null; refreshUI(); }
    function checkStatus() {
        const key = activeUser.replace(/\W/g, '');
        const done = (rpeResults[today] && rpeResults[today][key]);
        document.getElementById('rpe-input-zone').style.display = done ? 'none' : 'block';
        document.getElementById('rpe-done-zone').style.display = done ? 'block' : 'none';
    }

    function sendRPE(val) {
        if(confirm(`Send RPE ${val}?`)) {
            const key = activeUser.replace(/\W/g, '');
            db.ref(`rpe_results/${today}/${key}`).set({ name: activeUser, rpe: val, date: today });
        }
    }

    function deleteResult() {
        const key = activeUser.replace(/\W/g, '');
        db.ref(`rpe_results/${today}/${key}`).remove();
    }

    function authAdmin() { if(prompt("Pass:") === "1234") switchTab('admin'); }
    function switchTab(t) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-'+(t==='player'?'player':'admin')).classList.add('active');
        if(t==='admin') renderAdmin();
    }

    function renderAdmin() {
        const d = document.getElementById('adm-date').value;
        const dayData = rpeResults[d] || {};
        const completed = [], pending = [];
        players.forEach(p => {
            const key = p.replace(/\W/g, '');
            if(dayData[key]) completed.push({name: p, rpe: dayData[key].rpe, key: key});
            else pending.push(p);
        });
        const msg = encodeURIComponent("Hello, remember you didn't make the RPE test today");
        document.getElementById('list-pending').innerHTML = pending.map(p => `<div class="item-row"><span>❌ ${p}</span><a href="https://wa.me/?text=${msg}" target="_blank" class="btn-wa">WHATSAPP</a></div>`).join('');
        document.getElementById('list-completed').innerHTML = completed.map(c => `<div class="item-row"><span>${c.name}</span><div style="display:flex; align-items:center;"><span class="rpe-badge c${c.rpe}">${c.rpe}</span><button class="btn-del" onclick="resetOne('${d}','${c.key}')">RESET</button></div></div>`).join('');
        document.getElementById('roster-list').innerHTML = players.map(p => `<div class="item-row"><span>${p}</span><button class="btn-del" onclick="deleteFromSquad('${p}')">REMOVE</button></div>`).join('');
    }

    function addNewPlayer() {
        const n = document.getElementById('new-name').value.trim();
        if(n && !players.includes(n)) { players.push(n); db.ref('rpe_players').set(players); document.getElementById('new-name').value = ""; }
    }
    function deleteFromSquad(name) { if(confirm(`Remove ${name}?`)) { players = players.filter(p => p !== name); db.ref('rpe_players').set(players); } }
    function resetOne(d, k) { if(confirm("Reset?")) db.ref(`rpe_results/${d}/${k}`).remove(); }

    function exportExcel() {
        const d = document.getElementById('adm-date').value;
        const dayData = rpeResults[d] || {};
        
        // CSV with Semicolon (;) is the standard for European Excel to split columns automatically
        let csvContent = "\uFEFF"; // BOM for Excel UTF-8
        csvContent += "NAME;DATE OF TODAY;RESULT TEST\n";
        
        players.forEach(p => {
            const res = dayData[p.replace(/\W/g, '')]?.rpe || "Pending";
            // Important: Use semicolon as separator for separate cells
            csvContent += `${p};${d};${res}\n`;
        });
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", `RPE_Report_${d}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function cleanForPDF(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                  .replace(/ł/g, "l").replace(/Ł/g, "L");
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const d = document.getElementById('adm-date').value;
        const dayData = rpeResults[d] || {};
        
        doc.setFontSize(16);
        doc.text(`RPE Report - ${d}`, 14, 15);
        
        const tableData = players.map(p => [
            cleanForPDF(p), 
            d, 
            dayData[p.replace(/\W/g, '')]?.rpe || 'PENDING'
        ]);
        
        doc.autoTable({
            head: [['NAME', 'DATE OF TODAY', 'RESULT TEST']],
            body: tableData,
            startY: 25,
            styles: { font: "helvetica" }
        });
        doc.save(`RPE_Report_${d}.pdf`);
    }
</script>
</body>
</html>
